# Development Environment Configuration
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/fitness}
      database: fitness
  # Email Configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: dev-secret-key-for-jwt-signing-needs-to-be-at-least-256-bits-long
  expiration: 86400000  # 24 hours

# Razorpay - Use test keys for development
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    secret: ${RAZORPAY_KEY_SECRET:secret_placeholder}

# App Config
app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}

# CORS - Allow all for development
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:4173

# Logging - Debug for development
logging:
  level:
    com.abhi.FitnessTracker: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
