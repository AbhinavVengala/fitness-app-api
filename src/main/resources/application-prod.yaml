# Production Environment Configuration
spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE:fitness}
  # Email Configuration — must be set via env vars
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration — must be set via env vars
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# Razorpay — must be set via env vars (use live keys in production)
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}

# App Config
app:
  frontend:
    url: ${APP_FRONTEND_URL}

# CORS — restrict to production domain
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# Logging — production level
logging:
  level:
    root: WARN
    com.abhi.FitnessTracker: INFO
    org.springframework.security: WARN
    org.springframework.data.mongodb: WARN
